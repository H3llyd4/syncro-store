<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncro Store - Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet" rel="noopener noreferrer">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/produtos.css">
    <link rel="stylesheet" href="./styles/responsive.css">
    <link rel="stylesheet" href="./styles/animation.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo" id="logo">
            <span>Syncro</span> Store
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="produtos.html" class="active">Produtos</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>
    
<main class="container">
    
        <div class="tech-circle">
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
        </div>
    
        <section class="products-hero">
            <h1 class="page-title">Nossos <span>Produtos</span></h1>
            <p class="page-subtitle">Tecnologia de ponta para o teu estilo de vida</p>
        </section>
    
        <section class="filters">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="iphone">iPhone</button>
            <button class="filter-btn" data-filter="mac">Mac</button>
            <button class="filter-btn" data-filter="ipad">iPad</button>
            <button class="filter-btn" data-filter="acessorios">Acessórios</button>
        </section>
    
        <section class="products-grid">
    
            <div class="product-card animate-on-scroll" data-category="iphone">
                <div class="card-img-wrapper">
                    <img src="./assets/iphones.png" alt="iPhone 15 Pro" class="card-img">
                </div>
                <div class="card-info">
                    <span class="card-category">iPhone</span>
                    <h3 class="card-title">iPhone 15 Pro</h3>
                    <p class="card-price">€ 1.299,00</p>
                    <button class="btn-pulse">Ver Mais</button>
                </div>
            </div>
    
            <div class="product-card animate-on-scroll" data-category="mac">
                <div class="card-img-wrapper">
                    <img src="assets/macbook-m3.png" alt="MacBook Pro" class="card-img">
                </div>
                <div class="card-info">
                    <span class="card-category">Mac</span>
                    <h3 class="card-title">MacBook Pro M3</h3>
                    <p class="card-price">€ 2.499,00</p>
                    <button class="btn-pulse">Ver Mais</button>
                </div>
            </div>
    
            <div class="product-card animate-on-scroll" data-category="ipad">
                <div class="card-img-wrapper">
                    <img src="assets/iPadPro.png" alt="iPad Pro" class="card-img">
                </div>
                <div class="card-info">
                    <span class="card-category">iPad</span>
                    <h3 class="card-title">iPad Pro M2</h3>
                    <p class="card-price">€ 1.099,00</p>
                    <button class="btn-pulse">Ver Mais</button>
                </div>
            </div>
    
            <div class="product-card animate-on-scroll" data-category="acessorios">
                <div class="card-img-wrapper">
                    <img src="./assets/air-pods.png" alt="AirPods Pro" class="card-img">
                </div>
                <div class="card-info">
                    <span class="card-category">Acessórios</span>
                    <h3 class="card-title">AirPods Pro 2</h3>
                    <p class="card-price">€ 299,00</p>
                    <button class="btn-pulse">Ver Mais</button>
                </div>
            </div>
    
            <div class="product-card animate-on-scroll" data-category="acessorios">
                <div class="card-img-wrapper">
                    <img src="./assets/apple-watch.png" alt="Apple Watch" class="card-img">
                </div>
                <div class="card-info">
                    <span class="card-category">Acessórios</span>
                    <h3 class="card-title">Apple Watch S9</h3>
                    <p class="card-price">€ 449,00</p>
                    <button class="btn-pulse">Ver Mais</button>
                </div>
            </div>
    
            <div class="product-card animate-on-scroll" data-category="mac">
                <div class="card-img-wrapper">
                    <img src="assets/imac-m3.png" alt="iMac" class="card-img">
                </div>
                <div class="card-info">
                    <span class="card-category">Mac</span>
                    <h3 class="card-title">iMac M3</h3>
                    <p class="card-price">€ 1.799,00</p>
                    <button class="btn-pulse">Ver Mais</button>
                </div>
            </div>
    
        </section>
</main>

    <script src="scripts/produtos.js"></script>
</body>
</html>
